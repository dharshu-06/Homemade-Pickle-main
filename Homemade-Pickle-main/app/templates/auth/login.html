{% extends "base.html" %}
{% block title %}Login - Pickle Snacks{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow border-0" style="border-radius:12px;">
        <div class="card-body p-4">

          <h3 class="fw-bold text-center mb-1" style="color:#2c5f2d;">Welcome Back! 🥒</h3>
          <p class="text-center text-muted small mb-4">Log in to your account</p>

          <form method="POST" action="{{ url_for('auth.login') }}">

            <div class="form-group">
              <label class="form-label">Username or Email</label>
              <input type="text" class="form-control" name="username_or_email"
                     placeholder="Enter username or email" required>
            </div>

            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" name="password"
                     placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-custom w-100 py-2 border-0 rounded mt-2"
                    style="cursor:pointer;">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
          </form>

          <p class="text-center mt-3 mb-0 small">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" style="color:#2c5f2d;" class="fw-semibold">
              Register here
            </a>
          </p>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
