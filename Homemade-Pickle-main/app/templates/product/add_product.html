{% extends "base.html" %}
{% block title %}Add Product - Admin{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="admin-section">

        <div class="admin-header">
          <h2><i class="bi bi-plus-circle me-2"></i>Add New Product</h2>
        </div>

        <!-- enctype required for file upload -->
        <form method="POST" action="{{ url_for('product.add_product') }}"
              enctype="multipart/form-data">

          <div class="form-group">
            <label class="form-label">Product Name *</label>
            <input type="text" class="form-control" name="name"
                   placeholder="e.g. Dill Pickles" required>
          </div>

          <div class="form-group">
            <label class="form-label">Description *</label>
            <textarea class="form-control" name="description" rows="4"
                      placeholder="Describe the product…" required></textarea>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label class="form-label">Price (USD) *</label>
                <input type="number" class="form-control" name="price"
                       step="0.01" min="0" placeholder="9.99" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label class="form-label">Stock Quantity *</label>
                <input type="number" class="form-control" name="stock"
                       min="0" placeholder="50" required>
              </div>
            </div>
          </div>

          <!-- Image Section -->
          <div class="form-group">
            <label class="form-label">Product Image</label>

            <!-- Upload file -->
            <div class="mb-2">
              <label class="form-label small text-muted">
                <i class="bi bi-upload me-1"></i>Upload Image File
                <span class="text-muted">(jpg, png, gif, webp)</span>
              </label>
              <input type="file" class="form-control" name="image_file"
                     accept=".jpg,.jpeg,.png,.gif,.webp"
                     onchange="previewUploadedImage(this)">
            </div>

            <!-- Image preview -->
            <div id="image-preview-box" class="mb-2" style="display:none;">
              <img id="image-preview" src="" alt="Preview"
                   style="height:140px; width:auto; border-radius:8px;
                          border:2px solid #2c5f2d; object-fit:cover;">
            </div>

            <!-- OR divider -->
            <div class="d-flex align-items-center gap-2 my-2">
              <hr class="flex-grow-1"><span class="text-muted small">OR</span><hr class="flex-grow-1">
            </div>

            <!-- Image URL fallback -->
            <label class="form-label small text-muted">
              <i class="bi bi-link-45deg me-1"></i>Paste Image URL
            </label>
            <input type="url" class="form-control" name="image_url"
                   placeholder="https://example.com/image.jpg">
            <div class="form-text">Uploaded file takes priority over URL.</div>
          </div>

          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn-custom border-0 rounded px-4 py-2"
                    style="cursor:pointer;">
              <i class="bi bi-check-circle me-2"></i>Add Product
            </button>
            <a href="{{ url_for('product.admin_products') }}"
               class="btn btn-outline-secondary px-4 py-2">
              Cancel
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function previewUploadedImage(input) {
    const previewBox = document.getElementById('image-preview-box');
    const preview    = document.getElementById('image-preview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            previewBox.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    } else {
        previewBox.style.display = 'none';
    }
}
</script>
{% endblock %}
